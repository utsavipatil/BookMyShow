spring:
  application:
    name: bookmyshow

  # =============================== Datasource Configuration ===============================
  datasource:
    username: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/bookmyshow
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: BookMyShowHikariPool

  jpa:
    hibernate:
      ddl-auto: update #Update for persistence
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
